<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freshon 고정배차 관리자</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Freshon 고정배차 관리자</h1>
      <p class="version-note">월별 엑셀 업로드 방식으로 고정배차 캐시를 저장합니다.</p>
      <nav class="page-nav" aria-label="페이지 이동">
        <a href="/daily-routes.html">일일동선</a>
        <a href="/">권역 지도</a>
      </nav>
    </div>
    <div id="status">상태 확인 중</div>
  </header>

  <main>
    <section class="toolbar">
      <div>
        <label for="adminToken">관리 토큰</label>
        <input id="adminToken" type="password" placeholder="처음 한 번 저장하면 브라우저에 보관됩니다">
      </div>
      <button id="saveTokenButton" class="secondary" type="button">토큰 기억하기</button>
      <button id="reloadButton" type="button">저장자료 보기</button>
      <button id="csvButton" type="button">엑셀용 파일 받기</button>
    </section>

    <section class="toolbar upload-toolbar">
      <div class="wide">
        <label for="fixedDispatchFiles">고정배차 월별 엑셀</label>
        <input id="fixedDispatchFiles" type="file" multiple accept=".xlsx,.xls,.csv">
        <p class="help-text">월별 파일을 여러 개 선택해도 하나씩 저장합니다. 기존 데이터와 합쳐 저장하고 중복은 덮어씁니다.</p>
      </div>
      <button id="uploadButton" type="button">엑셀 저장하기</button>
    </section>

    <section class="route-status">
      <b>저장 상태</b>
      <span id="uploadStatus">-</span>
    </section>

    <section class="summary">
      <div><span>기준 기간</span><b id="rangeText">-</b></div>
      <div><span>갱신 시각</span><b id="generatedAt">-</b></div>
      <div><span>행 수</span><b id="rowCount">0</b></div>
    </section>

    <section class="table-wrap">
      <table id="dataTable"></table>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
